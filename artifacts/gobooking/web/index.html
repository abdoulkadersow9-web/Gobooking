<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1.00001, viewport-fit=cover" />
    <title>GoBooking</title>
    <style>
      html, body, #root {
        margin: 0; padding: 0;
        background: #050B28;
        height: 100%;
        overflow: hidden;
      }
      * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }

      /* ── Pre-splash overlay — visible BEFORE React loads ─────────────── */
      #pre-splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(150deg, #0C1B72 0%, #091250 50%, #050B28 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 99999;
        opacity: 1;
        transition: opacity 0.28s ease-in;
      }
      #pre-splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Soft glow behind logo */
      .sp-glow {
        position: absolute;
        width: 320px; height: 320px; border-radius: 50%;
        background: radial-gradient(circle, rgba(59,110,234,0.22) 0%, transparent 70%);
        pointer-events: none;
        animation: glowPulse 2.4s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%, 100% { transform: scale(0.95); opacity: 0.7; }
        50%       { transform: scale(1.05); opacity: 1;   }
      }

      /* Logo circle — visible immédiatement, aucune animation d'entrée */
      .sp-logo-wrap {
        width: 140px; height: 140px;
        border-radius: 50%;
        background: rgba(255,255,255,0.93);
        border: 3px solid rgba(255,255,255,0.7);
        display: flex; align-items: center; justify-content: center;
        box-shadow:
          0 0 0 12px rgba(255,255,255,0.07),
          0 0 60px 20px rgba(59,110,234,0.45),
          0 8px 40px rgba(0,0,0,0.35);
        position: relative;
        z-index: 1;
      }

      /* Text block — visible immédiatement */
      .sp-text {
        display: flex; flex-direction: column;
        align-items: center; gap: 7px;
      }
      .sp-name {
        font-size: 42px; font-weight: 800;
        color: #fff; letter-spacing: -1.2px;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
        text-shadow: 0 0 32px rgba(91,141,239,0.85);
        line-height: 1;
      }
      .sp-tag {
        font-size: 14px; font-weight: 500;
        color: rgba(255,255,255,0.58);
        letter-spacing: 0.6px; text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
      }

      /* Progress bar — visible immédiatement, seule la largeur s'anime */
      .sp-bar-wrap {
        position: fixed; bottom: 80px;
        width: 148px; height: 3px;
        background: rgba(255,255,255,0.10);
        border-radius: 2px; overflow: hidden;
      }
      .sp-bar-fill {
        height: 100%;
        background: #5B8DEF;
        border-radius: 2px;
        box-shadow: 0 0 10px 2px #5B8DEF;
        width: 0;
        animation: progressAnim 1.1s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      }
      @keyframes progressAnim {
        0%   { width: 0; }
        60%  { width: 72%; }
        100% { width: 88%; }
      }

      /* Version — visible immédiatement */
      .sp-version {
        position: fixed; bottom: 28px;
        font-size: 11px; color: rgba(255,255,255,0.25);
        letter-spacing: 0.8px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- ★ Pre-splash: renders in 0ms, before any JavaScript ★ -->
    <div id="pre-splash">
      <div class="sp-glow"></div>
      <div class="sp-logo-wrap">
        <!-- GoBooking "G" monogram in brand color -->
        <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Bus silhouette -->
          <rect x="12" y="26" width="72" height="40" rx="6" fill="#0C1B72"/>
          <rect x="16" y="22" width="64" height="8" rx="3" fill="#1A3ED8"/>
          <!-- Windows -->
          <rect x="18" y="32" width="14" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
          <rect x="36" y="32" width="14" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
          <rect x="54" y="32" width="14" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
          <!-- Door -->
          <rect x="68" y="34" width="10" height="16" rx="1.5" fill="rgba(255,255,255,0.6)"/>
          <!-- Undercarriage -->
          <rect x="14" y="62" width="68" height="6" rx="2" fill="#091250"/>
          <!-- Wheels -->
          <circle cx="26" cy="70" r="8" fill="#0C1B72" stroke="#1A3ED8" stroke-width="2"/>
          <circle cx="70" cy="70" r="8" fill="#0C1B72" stroke="#1A3ED8" stroke-width="2"/>
          <circle cx="26" cy="70" r="3.5" fill="#5B8DEF"/>
          <circle cx="70" cy="70" r="3.5" fill="#5B8DEF"/>
          <!-- Headlights -->
          <rect x="78" y="38" width="6" height="4" rx="2" fill="#F59E0B" opacity="0.9"/>
          <rect x="78" y="46" width="6" height="3" rx="1.5" fill="#F59E0B" opacity="0.5"/>
          <!-- Front bumper -->
          <rect x="79" y="52" width="5" height="6" rx="1" fill="#1A3ED8"/>
        </svg>
      </div>
      <div class="sp-text">
        <div class="sp-name">GoBooking</div>
        <div class="sp-tag">Voyagez partout en Côte d'Ivoire</div>
      </div>
      <div class="sp-bar-wrap"><div class="sp-bar-fill"></div></div>
      <div class="sp-version">v2.0 · Côte d'Ivoire</div>
    </div>

    <div id="root"></div>

    <script>
      // Fade out the pre-splash once React has mounted content in #root
      (function () {
        var splash = document.getElementById('pre-splash');
        if (!splash) return;

        function hideSplash() {
          splash.classList.add('hide');
          setTimeout(function () {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 320);
        }

        // Watch for React mounting its first child in #root
        var root = document.getElementById('root');
        var observer = new MutationObserver(function () {
          if (root && root.children.length > 0) {
            observer.disconnect();
            // Small delay so React's first paint is stable
            setTimeout(hideSplash, 120);
          }
        });
        if (root) observer.observe(root, { childList: true, subtree: false });

        // Failsafe: hide after 3s no matter what
        setTimeout(hideSplash, 3000);
      })();
    </script>
  </body>
</html>
