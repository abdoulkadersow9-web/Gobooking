kind = "web"
previewPath = "/admin/"
title = "GoBooking Admin Web"
version = "1.0.0"
id = "artifacts/gobooking-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 19050

[services.development]
run = "pnpm --filter @workspace/gobooking-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gobooking-admin", "run", "build" ]
publicDir = "artifacts/gobooking-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19050"
BASE_PATH = "/admin/"
