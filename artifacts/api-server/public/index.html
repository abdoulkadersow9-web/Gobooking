<!DOCTYPE html>
<html>
<head>
  <title>GoBooking</title>
</head>
<body>

<h2>Liste des trajets</h2>
<div id="trajets"></div>

<script>
const API = "https://d5f9034a-1293-43ac-b2c0-d1d1082d47f6-00-992085y4e6gf.spock.replit.dev/api/firebase";

// charger trajets
async function loadTrajets() {
  const res = await fetch(API + "/trajets");
  const data = await res.json();

  const container = document.getElementById("trajets");
  container.innerHTML = "";

  data.forEach(trajet => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${trajet.ville_depart} → ${trajet.ville_arrivee}</p>
      <p>Prix: ${trajet.prix}</p>
      <button onclick="reserver('${trajet.id}')">Réserver</button>
      <hr/>
    `;

    container.appendChild(div);
  });
}

// réserver
async function reserver(trajet_id) {
  const res = await fetch(API + "/reserver", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: "USER1",
      trajet_id,
      siege_numero: 1,
      prix: 5000
    })
  });

  const data = await res.json();

  alert("Réservation OK");

  payer(data.reservation_id);
}

// payer
async function payer(reservation_id) {
  const res = await fetch(API + "/payer", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      reservation_id,
      user_id: "USER1",
      montant: 5000,
      methode: "Orange Money"
    })
  });

  const data = await res.json();

  ticket(reservation_id);
}

// ticket
async function ticket(reservation_id) {
  const res = await fetch(API + "/ticket", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      reservation_id,
      user_id: "USER1",
      trajet_id: "TRAJET",
      siege_numero: 1
    })
  });

  const data = await res.json();

  afficherTicket(data.ticket_id);
}

// afficher ticket
async function afficherTicket(id) {
  const res = await fetch(API + "/ticket/" + id);
  const data = await res.json();

  document.body.innerHTML += `
    <h2>Ticket</h2>
    <img src="${data.qr_code}" width="200"/>
  `;
}

loadTrajets();
</script>

</body>
</html>
